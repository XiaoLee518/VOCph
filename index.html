        }

        }

            border: 1px solid #edf2f7;

            justify-content: space-between;
            margin-bottom: 6px;
        }
        .english-word {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0f172a;
            word-break: break-word;
        }
        .mark-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: #cbd5e1;
            padding: 0 8px;
        }
        .mark-btn.marked { color: #eab308; }

            font-size: 1.5rem;
            font-weight: 600;
            color: #334155;

            font-weight: 600;

<div class="app">
    <h1>分冊單元單字本</h1>

    <!-- 冊別選擇 -->
    <div class="top-bar">
        <select id="bookSelect" class="book-select">
            <option value="Book1" selected>第一冊 (U1~U6)</option>
            <option value="Book2">第二冊</option>
            <option value="Book3">第三冊</option>
            <option value="Book4">第四冊</option>
            <option value="Book5">第五冊</option>
            <option value="Book6">第六冊</option>
        </select>
    </div>

    <!-- 單元勾選區域 (用於閱讀與測驗模式) -->
    <div class="unit-panel" id="unitPanel">
        <div class="unit-title">選擇單元 (可複選)</div>
        <div class="unit-checkboxes" id="unitCheckboxes"></div>
        <div style="margin-top:8px; font-size:0.85rem; color:#64748b;" id="unitSummary"></div>
    </div>

    <!-- 模式切換 -->
    <div class="mode-switch">
        <div class="mode-btn active" data-mode="read">閱讀模式</div>
        <div class="mode-btn" data-mode="quiz">測驗模式</div>
        <div class="mode-btn" data-mode="book">單字書</div>
    </div>

    <!-- 測驗專用篩選 -->
    <div id="quizFilterRow" class="filter-row" style="display: none;">
        <label class="mark-filter">
            <input type="checkbox" id="onlyMarkedCheck"> 僅測驗已標記單字
        </label>
    </div>

    <!-- 主要內容區 -->
    <div id="contentArea"></div>

    <!-- 批量新增／管理區 (單字書內顯示) -->
    <div id="batchAddPanel" style="display: none;" class="batch-area">
        <details open>
            <summary style="font-weight:600; margin-bottom:10px;">➕ 批量新增自訂單字</summary>

                        <option value="Book4">第四冊</option><option value="Book5">第五冊</option><option value="Book6">第六冊</option>
                    </select>
                </label>
                <label>單元：<input type="text" id="customUnitInput" placeholder="例: U1" value="U1" style="padding:8px; border-radius:20px; width:80px; border:1px solid #cbd5e1;"></label>
            </div>
            <textarea id="batchInput" rows="3" placeholder="每行格式：英文,中文,搭配(選填)&#10;federal,聯邦的,federal funding&#10;stock,股票；存貨,be in stock" style="margin-top:12px;"></textarea>

            <div class="small-note" style="margin-top:6px;">自訂單字可於單字書中刪除，內建單字不可刪。</div>
        </details>
    </div>
</div>

            { word: "abortion", chinese: "墮胎", collocation: "have an abortion", book: "Book1", unit: "U6", type: "word" },
            { word: "barefoot", chinese: "光腳的", collocation: "walk barefoot", book: "Book1", unit: "U6", type: "word" },
            { word: "fluency", chinese: "流利", collocation: "fluent; fluently", book: "Book1", unit: "U6", type: "word" },
            { word: "foul", chinese: "骯髒的；犯規", collocation: "foul mood; commit a foul", book: "Book1", unit: "U6", type: "word" },
            { word: "abnormal", chinese: "不正常的", collocation: "unusual; normal", book: "Book1", unit: "U6", type: "word" },
            { word: "abolish", chinese: "廢除", collocation: "do away with", book: "Book1", unit: "U6", type: "word" },
            { word: "commentary", chinese: "評論；解說", collocation: "play-by-play commentary", book: "Book1", unit: "U6", type: "word" },
            { word: "diplomatic", chinese: "外交的；圓滑的", collocation: "diplomatic relations", book: "Book1", unit: "U6", type: "word" },
            { word: "innovation", chinese: "創新", collocation: "innovative", book: "Book1", unit: "U6", type: "word" },
            { word: "perceive", chinese: "察覺；認為", collocation: "perceive A as B", book: "Book1", unit: "U6", type: "word" },
            { word: "proclaim", chinese: "宣稱；宣布", collocation: "proclaim that", book: "Book1", unit: "U6", type: "word" },
            { word: "diaper", chinese: "尿布", collocation: "", book: "Book1", unit: "U6", type: "word" },
        ];

        // ========== 全域狀態 ==========
        let customWords = [];
        const STORAGE_CUSTOM = 'vocab_book_unit_custom_v4';
        const STORAGE_MARKS = 'vocab_book_unit_marks_v4';
        let markedWords = new Set();

        let currentMode = 'read';
        let currentBook = 'Book1';
        let selectedUnits = new Set(['U1']); // 預設勾選第一個單元

        let currentList = [];
        let currentIdx = 0;
        let quizCorrect = 0, quizAttempts = 0;

        // DOM
        const contentArea = document.getElementById('contentArea');
        const bookSelect = document.getElementById('bookSelect');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const quizFilterRow = document.getElementById('quizFilterRow');
        const onlyMarkedCheck = document.getElementById('onlyMarkedCheck');
        const unitCheckboxesDiv = document.getElementById('unitCheckboxes');
        const unitSummary = document.getElementById('unitSummary');
        const batchPanel = document.getElementById('batchAddPanel');

        // ---------- 資料載入 ----------
        function loadData() {
            const c = localStorage.getItem(STORAGE_CUSTOM);
            if (c) { try { customWords = JSON.parse(c); } catch(e){ customWords = []; } }
            const m = localStorage.getItem(STORAGE_MARKS);
            if (m) { try { markedWords = new Set(JSON.parse(m)); } catch(e){ markedWords = new Set(); } }
        }
        function saveCustom() { localStorage.setItem(STORAGE_CUSTOM, JSON.stringify(customWords)); }
        function saveMarks() { localStorage.setItem(STORAGE_MARKS, JSON.stringify([...markedWords])); }

        function getAllWords() { return [...presetDB, ...customWords]; }

        // 取得當前冊別可用單元
        function getAvailableUnits(book) {
            const words = getAllWords().filter(w => w.book === book);
            return [...new Set(words.map(w => w.unit).filter(u => u))].sort();
        }

        // 根據篩選條件取得單字 (閱讀/測驗用)
        function getFilteredWords() {
            let words = getAllWords().filter(w => w.book === currentBook && selectedUnits.has(w.unit));
            if (currentMode === 'quiz' && onlyMarkedCheck.checked) {
                words = words.filter(w => markedWords.has(w.word));
            }
            return words;
        }

        // 渲染單元勾選區
        function renderUnitCheckboxes() {
            const units = getAvailableUnits(currentBook);
            let html = '';
            units.forEach(u => {
                const checked = selectedUnits.has(u) ? 'checked' : '';
                html += `<label class="unit-checkbox"><input type="checkbox" value="${u}" ${checked}> ${u}</label>`;
            });
            unitCheckboxesDiv.innerHTML = html || '<span style="color:#888;">尚無單元</span>';
            document.querySelectorAll('#unitCheckboxes input').forEach(cb => {
                cb.addEventListener('change', e => {
                    if (e.target.checked) selectedUnits.add(e.target.value);
                    else selectedUnits.delete(e.target.value);
                    updateUnitSummary();
                    renderContent();
                });
            });
            updateUnitSummary();
        }

        function updateUnitSummary() {
            const cnt = getFilteredWords().length;
            unitSummary.innerText = `已選 ${selectedUnits.size} 個單元，共 ${cnt} 個單字`;
        }

        function toggleMark(word) {
            if (markedWords.has(word)) markedWords.delete(word);
            else markedWords.add(word);
            saveMarks();
        }

        // 渲染主內容
        function renderContent() {
            if (currentMode === 'read') renderReadMode();
            else if (currentMode === 'quiz') renderQuizMode();
            else if (currentMode === 'book') renderBookMode();
            batchPanel.style.display = currentMode === 'book' ? 'block' : 'none';
        }

        // ----- 閱讀模式 -----
        function renderReadMode() {
            const words = getFilteredWords();
            currentList = words.length ? words : [{ word: '尚無單字', chinese: '請勾選單元', collocation: '', unit: '' }];
            currentIdx = 0;
            const item = currentList[0];
            const isMarked = markedWords.has(item.word);
            let html = `
                <div class="card">
                    <div class="word-header">
                        <span class="english-word">${item.word}</span>
                        <button class="mark-btn ${isMarked ? 'marked' : ''}" id="toggleMarkBtn">★</button>
                    </div>
                    <div class="chinese-block">${item.chinese}</div>
                    <div class="collocation">${item.collocation || ' '}</div>
                    <div class="progress-indicator">
                        <span>${currentIdx+1} / ${currentList.length}</span>
                        <span>${item.unit || ''}</span>
                    </div>
                    <div class="action-row">
                        <button class="btn" id="speakBtn">朗讀</button>
                        <button class="btn" id="prevBtn">上一個</button>
                        <button class="btn" id="nextBtn">下一個</button>
                    </div>
                    <div class="action-row">
                        <button class="btn" id="speakAllBtn">連續朗讀全部</button>
                    </div>
                </div>
            `;
            contentArea.innerHTML = html;
            if (words.length) {
                document.getElementById('speakBtn').addEventListener('click', () => speakWord(currentList[currentIdx].word));
                document.getElementById('prevBtn').addEventListener('click', () => navigateRead(-1));
                document.getElementById('nextBtn').addEventListener('click', () => navigateRead(1));
                document.getElementById('speakAllBtn').addEventListener('click', speakAll);
                document.getElementById('toggleMarkBtn').addEventListener('click', () => {
                    toggleMark(currentList[currentIdx].word);
                    renderReadMode();
                });
            }
        }

        function navigateRead(delta) {
            if (!currentList.length) return;
            currentIdx = (currentIdx + delta + currentList.length) % currentList.length;
            renderReadMode();
        }

        function speakWord(word) {
            if (!word || word === '尚無單字') return;
            const u = new SpeechSynthesisUtterance(word);
            u.lang = 'en-US';
            speechSynthesis.speak(u);
        }

        function speakAll() {
            if (!currentList.length) return;
            let i = 0;
            function next() {
                if (i >= currentList.length) return;
                const w = currentList[i].word;
                if (w && w !== '尚無單字') {
                    const u = new SpeechSynthesisUtterance(w);
                    u.lang = 'en-US';
                    u.onend = () => { i++; next(); };
                    speechSynthesis.speak(u);
                } else { i++; next(); }
            }
            speechSynthesis.cancel();
            next();
        }

        // ----- 測驗模式 (不顯示搭配詞) -----
        function renderQuizMode() {
            const words = getFilteredWords();
            currentList = words.length ? words : [{ word: '無單字', chinese: '沒有可測單字', collocation: '' }];
            currentIdx = 0;
            quizCorrect = 0; quizAttempts = 0;
            const item = currentList[0];
            let html = `
                <div class="card">
                    <div class="chinese-block" style="font-size:2rem;">${item.chinese}</div>
                    <div class="progress-indicator">
                        <span>${currentIdx+1} / ${currentList.length}</span>
                        <span id="quizScore">正確 ${quizCorrect} / ${quizAttempts}</span>
                    </div>
                    <input type="text" class="spell-input" id="quizInput" placeholder="輸入英文" autocomplete="off">
                    <div class="action-row">
                        <button class="btn" id="quizCheckBtn">檢查</button>
                        <button class="btn" id="quizNextBtn">下一題</button>
                    </div>
                    <div class="feedback" id="quizFeedback"></div>
                </div>
            `;
            contentArea.innerHTML = html;
            if (words.length) {
                document.getElementById('quizCheckBtn').addEventListener('click', checkQuiz);
                document.getElementById('quizNextBtn').addEventListener('click', nextQuiz);
                document.getElementById('quizInput').addEventListener('keypress', e => { if(e.key==='Enter') checkQuiz(); });
            }
        }

        function checkQuiz() {
            const item = currentList[currentIdx];
            if (!item || item.word === '無單字') return;
            const ans = document.getElementById('quizInput').value.trim();
            quizAttempts++;
            if (ans.toLowerCase() === item.word.toLowerCase()) {
                quizCorrect++;
                document.getElementById('quizFeedback').innerHTML = `<span class="correct">正確！</span>`;
                document.getElementById('quizScore').innerText = `正確 ${quizCorrect} / ${quizAttempts}`;
                setTimeout(() => nextQuiz(), 400);
            } else {
                document.getElementById('quizFeedback').innerHTML = `<span class="wrong">錯誤，正確：${item.word}</span>`;
                document.getElementById('quizScore').innerText = `正確 ${quizCorrect} / ${quizAttempts}`;
            }
        }

        function nextQuiz() {
            if (!currentList.length) return;
            currentIdx = (currentIdx + 1) % currentList.length;
            const item = currentList[currentIdx];
            document.querySelector('.chinese-block').innerText = item.chinese;
            document.querySelector('.progress-indicator span:first-child').innerText = `${currentIdx+1} / ${currentList.length}`;
            document.getElementById('quizInput').value = '';
            document.getElementById('quizFeedback').innerHTML = '';
        }

        // ----- 單字書模式 (列表瀏覽) -----
        function renderBookMode() {
            let words = getAllWords().filter(w => w.book === currentBook);
            let html = `<div style="margin-bottom:12px;"><strong>${currentBook} 全部單字 (${words.length})</strong></div>`;
            html += `<div class="word-list">`;
            if (!words.length) html += `<div class="empty-msg">尚無單字</div>`;
            else {
                words.forEach(item => {
                    const isMarked = markedWords.has(item.word);
                    const isCustom = customWords.some(c => c.word === item.word && c.book === item.book && c.unit === item.unit);
                    html += `
                        <div class="list-item">
                            <div class="info"><span class="word">${item.word}</span> — ${item.chinese} ${item.collocation ? '· '+item.collocation : ''} <span style="color:#888;">(${item.unit})</span></div>
                            <button class="small-btn mark-toggle" data-word="${item.word}">${isMarked ? '★取消' : '☆標記'}</button>
                            <button class="small-btn speak-item" data-word="${item.word}">朗讀</button>
                            ${isCustom ? `<button class="small-btn delete-custom" data-word="${item.word}" data-unit="${item.unit}">刪除</button>` : ''}
                        </div>
                    `;
                });
            }
            html += `</div>`;
            contentArea.innerHTML = html;
            document.querySelectorAll('.speak-item').forEach(b => b.addEventListener('click', e => speakWord(e.target.dataset.word)));
            document.querySelectorAll('.mark-toggle').forEach(b => b.addEventListener('click', e => {
                toggleMark(e.target.dataset.word);
                renderBookMode();
            }));
            document.querySelectorAll('.delete-custom').forEach(b => b.addEventListener('click', e => {
                const w = e.target.dataset.word;
                const u = e.target.dataset.unit;
                customWords = customWords.filter(c => !(c.word === w && c.book === currentBook && c.unit === u));
                saveCustom();
                renderBookMode();
                renderUnitCheckboxes();
            }));
        }

        // 批量新增
        function batchAddWords() {
            const book = document.getElementById('customBookSelect').value;
            const unit = document.getElementById('customUnitInput').value.trim();
            if (!unit) { alert('請輸入單元'); return; }
            const text = document.getElementById('batchInput').value.trim();
            text.split('\n').forEach(line => {
                const p = line.split(',').map(s => s.trim());
                if (p.length >= 2) {
                    const word = p[0], chinese = p[1], collocation = p[2] || '';
                    if (word && chinese) {
                        customWords.push({ word, chinese, collocation, book, unit, type: 'word' });
                    }
                }
            });
            saveCustom();
            document.getElementById('batchInput').value = '';
            if (currentMode === 'book') renderBookMode();
            renderUnitCheckboxes();
            if (currentBook === book && !selectedUnits.has(unit)) {
                selectedUnits.add(unit);
                renderUnitCheckboxes();
                renderContent();
            }
        }

        // 初始化
        function init() {
            loadData();
            renderUnitCheckboxes();
            renderContent();

            bookSelect.addEventListener('change', e => {
                currentBook = e.target.value;
                const units = getAvailableUnits(currentBook);
                selectedUnits.clear();
                if (units.length) selectedUnits.add(units[0]);
                renderUnitCheckboxes();
                renderContent();
            });

            modeBtns.forEach(btn => btn.addEventListener('click', () => {
                modeBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMode = btn.dataset.mode;
                quizFilterRow.style.display = currentMode === 'quiz' ? 'flex' : 'none';
                renderContent();
            }));

            onlyMarkedCheck.addEventListener('change', () => {
                if (currentMode === 'quiz') renderQuizMode();
            });

            document.getElementById('batchAddBtn').addEventListener('click', batchAddWords);
        }

        init();
    })();
</script>
